name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  homebrew:
    name: Homebrew CLI
    runs-on: macos-latest
    env:
      PACKAGE: codex-history-repair
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build CLI archives
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets dist-work

          for TARGET in aarch64-apple-darwin x86_64-apple-darwin; do
            cargo build -p "${PACKAGE}" --release --target "${TARGET}"

            ARCHIVE="${PACKAGE}-${VERSION}-${TARGET}.tar.gz"
            STAGING="dist-work/${PACKAGE}-${VERSION}-${TARGET}"
            mkdir -p "${STAGING}"
            cp "target/${TARGET}/release/${PACKAGE}" "${STAGING}/"
            cp README.md README.en.md LICENSE "${STAGING}/"
            tar -C "${STAGING}" -czf "release-assets/${ARCHIVE}" .
            shasum -a 256 "release-assets/${ARCHIVE}"
          done

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Codex History Repair ${{ github.ref_name }}
          body: CLI archives for Homebrew installation.
          draft: false
          prerelease: false
          files: release-assets/*

      - name: Update Homebrew tap
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_ARCHIVE="${PACKAGE}-${VERSION}-aarch64-apple-darwin.tar.gz"
          X64_ARCHIVE="${PACKAGE}-${VERSION}-x86_64-apple-darwin.tar.gz"
          ARM_SHA="$(shasum -a 256 "release-assets/${ARM_ARCHIVE}" | awk '{print $1}')"
          X64_SHA="$(shasum -a 256 "release-assets/${X64_ARCHIVE}" | awk '{print $1}')"
          BASE_URL="https://github.com/Alexlangl/${PACKAGE}/releases/download/v${VERSION}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Alexlangl/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/codex-history-repair.rb <<EOF
          class CodexHistoryRepair < Formula
            desc "Repair local Codex history after provider switching"
            homepage "https://github.com/Alexlangl/codex-history-repair"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/${ARM_ARCHIVE}"
                sha256 "${ARM_SHA}"
              else
                url "${BASE_URL}/${X64_ARCHIVE}"
                sha256 "${X64_SHA}"
              end
            end

            def install
              bin.install "codex-history-repair"
            end

            test do
              system "#{bin}/codex-history-repair", "--help"
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/codex-history-repair.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already up to date"
          else
            git commit -m "Update codex-history-repair to ${VERSION}"
            git push
          fi
