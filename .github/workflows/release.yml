name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cli-dist:
    name: CLI cargo-dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: axodotdev/cargo-dist@v0.28.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          command: host

  app:
    name: App ${{ matrix.platform }} ${{ matrix.args }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            artifact_suffix: macos-universal
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            artifact_suffix: macos-x64
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact_suffix: macos-arm64
          - platform: windows-latest
            args: ""
            artifact_suffix: windows-x64
          - platform: ubuntu-latest
            args: ""
            artifact_suffix: linux-x64
          - platform: ubuntu-24.04-arm
            args: ""
            artifact_suffix: linux-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Tauri bundle
        run: pnpm tauri build ${{ matrix.args }}
      - name: Normalize release asset names
        env:
          CHR_VERSION: ${{ github.ref_name }}
          CHR_ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
        run: node scripts/rename-tauri-artifacts.mjs
      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Codex History Repair ${{ github.ref_name }}
          body: See the assets below for platform-specific bundles.
          draft: true
          prerelease: false
          files: release-assets/*
